<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
</head>
<body>
    <form action="">
        <h1>Payment Form</h1>
        <h2>Contact Information</h2>
        <p><b>Name * </b> : <input type="text" name="name" required></p>
        <p>
        <b>Male</b> <input type="radio" name="gender" id="male" required>
        <b>Female</b> <input type="radio" name="gender" id="female" required>
        </p>
        <p><b>Address : </b> <textarea name="address" id="address" cols="100" rols="100" required></textarea></p>
        <p><b>Email : <input type="email" name="email" id="email" required></b></p>
        <p><b>Pincode : <input type="number" name="pincode" id="pincode" required></b></p>
        <br> <hr>
        <h2>Payment Details</h2>
        <p> <b>Card Type : * </b>
            <select name="card_type" id="card_type" required>
                <option value="">--Select a Card Type--</option>
                <option value="visa">Visa</option>
                <option value="rupay">Rupay</option>
                <option value="mastercard">MasterCard</option>
            </select>
        </p>
        <p> <b>Card Number : * </b> <input type="number" name="card_number" id="card_number" required></b></p>
        <p> <b>Expiration Date : * <input type="date" name="exp_date" id="exp_date" required></b> </p>
        <p> <b>CVV : * </b> <input type="password" name="cvv" id="cvv" required></p>
        <input type="submit" value="Pay Now">
    </form>
</body>
</html>
