<!DOCTYPE html>
<head>
    <title>Jquery Code</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#btn").click(function() {
                $("#p").text("Sukhman ji clicked the button!");
                $(".p2").slideUp();
                $("img").fadeOut();
            });

            $("#btn2").hover(function() {
                $("#p").text("Sukhman ji hovered over the restart button!");
                $(".p2").text("Again hovering over p2").slideDown();
                $("img").fadeIn();
            });

            $("a").click(function(event) {
                event.preventDefault();
                alert("This type of Single clicks do not work on me.");
            });
        });
    </script>
</head>
<body>
    <h1 id="text">Hello! Sukhman ji, how are you!!</h1>
    <p id="p">This is paragraph and it contains so many words but the fact is that this paragraph contains a word "paragraph".</p>
    <p class="p2" >i don't know what should i write in this paragraph.</p>
    <img style="height:200px;" src="logo.jpeg">
    <br><br>
    <button id="btn">Click Me</button>
    <button id="btn2">Restart</button>
    <a href="https://www.google.com">googleee</a>
</body>
</html>
